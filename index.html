<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="שעון מעורר">
<meta name="theme-color" content="#0D0F14">
<title>שעון מעורר</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0D0F14;color:#E8EAF0;font-family:system-ui,-apple-system,sans-serif}
button,input{font-family:inherit;color:#E8EAF0}
input::placeholder{color:#6B7280}
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(1)}

@keyframes pulse{from{opacity:.1}to{opacity:.3}}
@keyframes ringBell{0%,100%{transform:rotate(-15deg)}50%{transform:rotate(15deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ring{display:inline-block;animation:ringBell .45s ease-in-out infinite}
.shake{animation:shake .4s ease-in-out}
.fadein{animation:fadeIn .25s ease}

/* ── bottom nav ── */
#bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  background:#161921;border-top:1px solid #2A2F42;display:flex;z-index:50}
.nb{flex:1;padding:10px 0 18px;background:none;border:none;cursor:pointer;display:flex;
  flex-direction:column;align-items:center;gap:3px;font-size:10px;color:#6B7280;transition:color .15s}
.nb.on{color:#F5A623}
.ni{font-size:22px;line-height:1}

/* ── barcode scanner overlay ── */
#sc-ov{display:none;position:fixed;inset:0;z-index:999;background:#000;flex-direction:column;align-items:center;justify-content:center}
#sc-ov.on{display:flex}
#sc-vid{width:100%;max-width:500px;aspect-ratio:4/3;object-fit:cover;display:block;background:#111}
#sc-frame{position:absolute;width:60%;aspect-ratio:1;border:2px solid #F5A623;border-radius:12px;top:50%;left:50%;transform:translate(-50%,-60%)}
#sc-hint{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.9);font-size:14px;background:rgba(0,0,0,.6);border-radius:8px;padding:8px 18px;text-align:center;white-space:nowrap}
#sc-close{position:absolute;top:24px;left:24px;background:rgba(0,0,0,.6);border:none;border-radius:10px;padding:10px 18px;color:#fff;font-size:15px;cursor:pointer}

/* ── photo capture overlay ── */
#ph-ov{display:none;position:fixed;inset:0;z-index:999;background:#000;flex-direction:column;align-items:center;justify-content:center}
#ph-ov.on{display:flex}
#ph-vid{width:100%;max-width:500px;flex:1;object-fit:cover;display:block;background:#111}
#ph-label{position:absolute;top:0;left:0;right:0;background:rgba(0,0,0,.75);padding:22px 20px 18px;font-size:15px;font-weight:600;color:#fff;text-align:center;line-height:1.55}
#ph-bar{position:absolute;bottom:0;left:0;right:0;padding:24px;display:flex;justify-content:center;background:rgba(0,0,0,.5)}
#ph-shutter{width:72px;height:72px;border-radius:50%;background:#fff;border:5px solid rgba(255,255,255,.35);cursor:pointer;transition:transform .1s}
#ph-shutter:active{transform:scale(.88)}
#ph-close{position:absolute;top:24px;left:24px;background:rgba(0,0,0,.6);border:none;border-radius:10px;padding:10px 18px;color:#fff;font-size:15px;cursor:pointer}

/* ── photo preview ── */
#pv-ov{display:none;position:fixed;inset:0;z-index:1000;background:#000;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:0}
#pv-ov.on{display:flex}
#pv-img{width:100%;max-width:500px;aspect-ratio:4/3;object-fit:cover}
#pv-bar{width:100%;max-width:500px;display:flex;gap:12px;padding:20px 16px;background:#161921}
#pv-bar button{flex:1;padding:14px;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;border:none}
#pv-ok{background:#F5A623;color:#000}
#pv-retry{background:#2A2F42;color:#E8EAF0}

/* ── object match overlay ── */
#om-ov{display:none;position:fixed;inset:0;z-index:999;background:#000;flex-direction:column;align-items:center;justify-content:center}
#om-ov.on{display:flex}
#om-vid{width:100%;max-width:500px;flex:1;object-fit:cover;display:block;background:#111}
#om-label{position:absolute;top:0;left:0;right:0;background:rgba(0,0,0,.75);padding:22px 20px 18px;font-size:15px;font-weight:600;color:#fff;text-align:center;line-height:1.55}
#om-bar{position:absolute;bottom:0;left:0;right:0;padding:24px;display:flex;justify-content:center;background:rgba(0,0,0,.5)}
#om-shutter{width:72px;height:72px;border-radius:50%;background:#2EC069;border:5px solid rgba(46,192,105,.35);cursor:pointer;transition:transform .1s;display:flex;align-items:center;justify-content:center;font-size:28px}
#om-shutter:active{transform:scale(.88)}
#om-close{position:absolute;top:24px;left:24px;background:rgba(0,0,0,.6);border:none;border-radius:10px;padding:10px 18px;color:#fff;font-size:15px;cursor:pointer}
#om-status{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);font-size:15px;font-weight:700;background:rgba(0,0,0,.75);border-radius:10px;padding:10px 20px;white-space:nowrap;display:none}

/* ringtone chips */
.rt-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.rt-chip{padding:8px 14px;border-radius:20px;border:1.5px solid #2A2F42;background:#1E2230;color:#6B7280;font-size:13px;cursor:pointer;transition:all .15s;text-align:right}
.rt-chip.sel{border-color:#F5A623;color:#F5A623}

/* object library */
.obj-card{background:#1E2230;border:1px solid #2A2F42;border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.obj-thumb{width:50px;height:50px;border-radius:8px;object-fit:cover;background:#0D0F14;flex-shrink:0}
</style>
</head>
<body>

<!-- barcode scanner -->
<div id="sc-ov">
  <video id="sc-vid" autoplay playsinline muted></video>
  <div id="sc-frame"></div>
  <div id="sc-hint">כוון את המצלמה לברקוד</div>
  <button id="sc-close">✕ סגור</button>
</div>

<!-- photo capture (for library registration) -->
<div id="ph-ov">
  <video id="ph-vid" autoplay playsinline muted></video>
  <div id="ph-label">מצלם חפץ</div>
  <button id="ph-close">✕ סגור</button>
  <div id="ph-bar"><button id="ph-shutter"></button></div>
</div>

<!-- photo preview after capture -->
<div id="pv-ov">
  <img id="pv-img" src="" alt="תצוגה מקדימה">
  <div id="pv-bar">
    <button id="pv-ok">✓ שמור</button>
    <button id="pv-retry">↺ צלם שוב</button>
  </div>
</div>

<!-- object match (dismiss) -->
<div id="om-ov">
  <video id="om-vid" autoplay playsinline muted></video>
  <div id="om-label">כוון אל החפץ ולחץ לצלם</div>
  <button id="om-close">✕ סגור</button>
  <div id="om-status"></div>
  <div id="om-bar"><button id="om-shutter">📷</button></div>
</div>

<div id="root" style="padding-bottom:64px"></div>
<div id="bnav">
  <button class="nb on" data-tab="alarms" onclick="switchTab('alarms')"><span class="ni">⏰</span>שעונים</button>
  <button class="nb" data-tab="library" onclick="switchTab('library')"><span class="ni">🖼️</span>ספריית חפצים</button>
  <button class="nb" data-tab="settings" onclick="switchTab('settings')"><span class="ni">⚙️</span>הגדרות</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<script>
// ══ palette & helpers ══════════════════════════════════════════════
const C={bg:'#0D0F14',surface:'#161921',card:'#1E2230',border:'#2A2F42',
  amber:'#F5A623',amberDim:'#7A5310',red:'#E84855',green:'#2EC069',text:'#E8EAF0',muted:'#6B7280',dimmer:'#3A3F52'};
const pad=n=>String(n).padStart(2,'0');
const $=id=>document.getElementById(id);
function el(tag,p={},...kids){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(p)){
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k==='cls')e.className=v;
    else if(k[0]==='o'&&k[1]==='n')e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  kids.flat().forEach(c=>c!=null&&e.append(typeof c==='string'?document.createTextNode(c):c));
  return e;
}
const div=(p,...c)=>el('div',p,...c);
const btn=(p,...c)=>el('button',p,...c);
const lbl=t=>el('label',{style:{display:'block',fontSize:'13px',color:C.muted,marginBottom:'6px',marginTop:'16px',fontWeight:500}},t);
function inp(type,val,dir,ph=''){
  const i=el('input',{type,dir,placeholder:ph,style:{width:'100%',background:C.card,border:`1px solid ${C.border}`,borderRadius:'12px',padding:'12px 14px',fontSize:'16px',outline:'none',color:C.text}});
  i.value=val||'';return i;
}

// ══ storage ════════════════════════════════════════════════════════
function load(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def}catch{return def}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

let alarms   = load('alarms',[]);
let objLib   = load('objLib',[]); // [{id,name,dataUrl}]
let settings = load('settings',{masterPassword:'',ringtone:'classic'});

const saveAlarms=()=>save('alarms',alarms);
const saveLib=()=>save('objLib',objLib);
const saveSettings=()=>save('settings',settings);

// ══ ringtones ══════════════════════════════════════════════════════
const RINGTONES=[
  {id:'classic',name:'📢 קלאסי',desc:'ביפים חדים',
    play(ctx,t,vol){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='square';o.frequency.setValueAtTime(880,t);o.frequency.exponentialRampToValueAtTime(440,t+.1);g.gain.setValueAtTime(vol*.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.4);o.start(t);o.stop(t+.4);}},
  {id:'gentle',name:'🌅 מתגבר',desc:'מתחיל רגוע ומתחזק',
    play(ctx,t,vol){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.setValueAtTime(440,t);o.frequency.linearRampToValueAtTime(528,t+.6);g.gain.setValueAtTime(vol*.04,t);g.gain.linearRampToValueAtTime(vol*.25,t+.5);g.gain.exponentialRampToValueAtTime(.001,t+.8);o.start(t);o.stop(t+.8);}},
  {id:'digital',name:'📱 דיגיטלי',desc:'ריצוד מודרני',
    play(ctx,t,vol){[0,.1,.2].forEach((dt,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sawtooth';o.frequency.setValueAtTime(660+i*110,t+dt);g.gain.setValueAtTime(vol*.2,t+dt);g.gain.exponentialRampToValueAtTime(.001,t+dt+.08);o.start(t+dt);o.stop(t+dt+.1);});}},
  {id:'bell',name:'🔔 פעמון',desc:'צלצול רך',
    play(ctx,t,vol){[1,2,4,6].forEach((h,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sine';o.frequency.value=523.25*h;g.gain.setValueAtTime(vol*.15/h,t);g.gain.exponentialRampToValueAtTime(.001,t+1.5);o.start(t);o.stop(t+1.6);});}},
  {id:'siren',name:'🚨 צופר',desc:'דחוף וחזק',
    play(ctx,t,vol){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type='sawtooth';o.frequency.setValueAtTime(400,t);o.frequency.linearRampToValueAtTime(800,t+.3);o.frequency.linearRampToValueAtTime(400,t+.6);g.gain.setValueAtTime(vol*.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.65);o.start(t);o.stop(t+.7);}}
];

let audioCtx=null,beepIv=null,gentleVol=0.05,beepN=0;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;}
function playBeep(rid){try{const ctx=getCtx(),rt=RINGTONES.find(r=>r.id===rid)||RINGTONES[0];rt.play(ctx,ctx.currentTime,rid==='gentle'?gentleVol:1);}catch(e){}}
function startSound(rid){beepN=0;gentleVol=0.05;playBeep(rid);clearInterval(beepIv);beepIv=setInterval(()=>{beepN++;if(rid==='gentle')gentleVol=Math.min(1,.05+beepN/120);playBeep(rid);},rid==='gentle'?900:800);}
const stopSound=()=>{clearInterval(beepIv);beepN=0;gentleVol=0.05;};

let vibIv=null;
function startVib(){if(!('vibrate'in navigator))return;navigator.vibrate([300,100,300]);vibIv=setInterval(()=>navigator.vibrate([300,100,300]),700);}
function stopVib(){clearInterval(vibIv);if('vibrate'in navigator)navigator.vibrate(0);}

// ══ barcode scanner ════════════════════════════════════════════════
let scStream=null,scRaf=null,scCb=null;
async function openScanner(cb){
  scCb=cb;$('sc-ov').classList.add('on');
  const vid=$('sc-vid');
  if(scStream){startScLoop(vid);return;}
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}});
    scStream=s;vid.srcObject=s;
    vid.onloadedmetadata=async()=>{try{await vid.play()}catch(e){}startScLoop(vid);};
  }catch(e){closeScanner();alert('שגיאת מצלמה: '+e.message);}
}
function startScLoop(vid){
  cancelAnimationFrame(scRaf);
  const cv=document.createElement('canvas'),ctx=cv.getContext('2d');
  let bd=null;if('BarcodeDetector'in window){try{bd=new BarcodeDetector()}catch(_){}}
  async function tick(){
    if(!scStream)return;
    if(vid.readyState>=vid.HAVE_ENOUGH_DATA&&vid.videoWidth>0){
      cv.width=vid.videoWidth;cv.height=vid.videoHeight;ctx.drawImage(vid,0,0);
      let r=null;
      if(bd){try{const res=await bd.detect(vid);if(res.length)r=res[0].rawValue}catch(_){}}
      if(!r&&window.jsQR){const d=ctx.getImageData(0,0,cv.width,cv.height);const q=jsQR(d.data,d.width,d.height,{inversionAttempts:'dontInvert'});if(q)r=q.data;}
      if(r){const c=scCb;closeScanner();c(r);return;}
    }
    scRaf=requestAnimationFrame(tick);
  }
  scRaf=requestAnimationFrame(tick);
}
function closeScanner(){
  cancelAnimationFrame(scRaf);scRaf=null;
  if(scStream){scStream.getTracks().forEach(t=>t.stop());scStream=null;}
  scCb=null;$('sc-ov').classList.remove('on');$('sc-vid').srcObject=null;
}
$('sc-close').onclick=closeScanner;

// ══ photo capture ══════════════════════════════════════════════════
let phStream=null,phCb=null,phLabel='';
async function openPhoto(labelText, cb){
  phLabel=labelText;phCb=cb;
  $('ph-label').textContent=labelText;
  $('ph-ov').classList.add('on');
  const vid=$('ph-vid');
  if(phStream){vid.srcObject=phStream;try{await vid.play()}catch(e){};return;}
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}});
    phStream=s;vid.srcObject=s;
    vid.onloadedmetadata=async()=>{try{await vid.play()}catch(e){}};
  }catch(e){closePhoto();alert('שגיאת מצלמה: '+e.message);}
}
function capturePhoto(){
  const vid=$('ph-vid');
  const cv=document.createElement('canvas');
  cv.width=vid.videoWidth;cv.height=vid.videoHeight;
  cv.getContext('2d').drawImage(vid,0,0);
  return cv.toDataURL('image/jpeg',.85);
}
function closePhoto(){
  if(phStream){phStream.getTracks().forEach(t=>t.stop());phStream=null;}
  phCb=null;$('ph-ov').classList.remove('on');$('ph-vid').srcObject=null;
}
$('ph-close').onclick=closePhoto;
$('ph-shutter').onclick=()=>{
  const dataUrl=capturePhoto();
  closePhoto();
  // show preview
  $('pv-img').src=dataUrl;
  $('pv-ov').classList.add('on');
  $('pv-ok').onclick=()=>{$('pv-ov').classList.remove('on');if(phCb)phCb(dataUrl);};
  $('pv-retry').onclick=()=>{$('pv-ov').classList.remove('on');openPhoto(phLabel,phCb);};
};

// ══ image similarity (pixel-based) ════════════════════════════════
// Resize both images to 32×32 and compare average color distance
function imgToPixels(dataUrl,cb){
  const img=new Image();
  img.onload=()=>{
    const cv=document.createElement('canvas');cv.width=32;cv.height=32;
    cv.getContext('2d').drawImage(img,0,0,32,32);
    cb(cv.getContext('2d').getImageData(0,0,32,32).data);
  };
  img.src=dataUrl;
}
function similarity(d1,d2){
  let diff=0;
  for(let i=0;i<d1.length;i+=4){
    diff+=Math.abs(d1[i]-d2[i])+Math.abs(d1[i+1]-d2[i+1])+Math.abs(d1[i+2]-d2[i+2]);
  }
  // normalize: 0=identical, 1=completely different
  return 1-(diff/(32*32*3*255));
}

// ══ object match (dismiss) ═════════════════════════════════════════
let omStream=null,omCb=null,omTargetPixels=null,omObjName='';
async function openObjectMatch(obj, cb){
  // obj = {id,name,dataUrl}
  omObjName=obj.name;omCb=cb;
  $('om-label').textContent=`📸 צלם את: ${obj.name}`;
  $('om-status').style.display='none';
  $('om-ov').classList.add('on');
  // pre-load target pixels
  imgToPixels(obj.dataUrl,px=>{omTargetPixels=px;});
  const vid=$('om-vid');
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}});
    omStream=s;vid.srcObject=s;
    vid.onloadedmetadata=async()=>{try{await vid.play()}catch(e){}};
  }catch(e){closeObjMatch();alert('שגיאת מצלמה: '+e.message);}
}
$('om-shutter').onclick=()=>{
  const vid=$('om-vid');
  const cv=document.createElement('canvas');
  cv.width=vid.videoWidth;cv.height=vid.videoHeight;
  cv.getContext('2d').drawImage(vid,0,0);
  const dataUrl=cv.toDataURL('image/jpeg',.85);
  imgToPixels(dataUrl,px=>{
    if(!omTargetPixels){showOmStatus('⏳ טוען...','#F5A623');return;}
    const score=similarity(omTargetPixels,px);
    if(score>0.72){
      showOmStatus('✅ זוהה!','#2EC069');
      setTimeout(()=>{const c=omCb;closeObjMatch();c();},700);
    }else{
      showOmStatus('❌ לא נראה כמו '+omObjName+' — נסה שוב','#E84855');
      setTimeout(()=>{$('om-status').style.display='none';},2000);
    }
  });
};
function showOmStatus(txt,color){
  const s=$('om-status');s.textContent=txt;s.style.color=color;s.style.display='block';
}
function closeObjMatch(){
  if(omStream){omStream.getTracks().forEach(t=>t.stop());omStream=null;}
  omCb=null;omTargetPixels=null;$('om-ov').classList.remove('on');$('om-vid').srcObject=null;
}
$('om-close').onclick=closeObjMatch;

// ══ app state ══════════════════════════════════════════════════════
let activeAlarm=null,screen='home',dismissMode=null,curTab='alarms',showAdd=false;
let lastTrigKey='';

function checkAlarms(){
  if(screen!=='home')return;
  const now=new Date();
  const ts=pad(now.getHours())+':'+pad(now.getMinutes());
  const key=ts+'-'+now.getDate();
  if(key===lastTrigKey)return;
  const a=alarms.find(a=>a.enabled&&a.time===ts);
  if(a){lastTrigKey=key;triggerAlarm(a);}
}
function triggerAlarm(a){
  activeAlarm=a;screen='dismiss';dismissMode=null;
  (window._startAlarm||startSound)(a.ringtone||'classic');startVib();render();
}
function dismissAlarm(){
  (window._stopAlarm||stopSound)();stopVib();closeScanner();closeObjMatch();
  alarms=alarms.map(a=>a.id===activeAlarm.id?{...a,enabled:false}:a);
  saveAlarms();activeAlarm=null;screen='home';dismissMode=null;render();
}
function doShake(){const e=$('dc');if(!e)return;e.classList.remove('shake');void e.offsetWidth;e.classList.add('shake');}

function switchTab(t){
  curTab=t;
  document.querySelectorAll('.nb').forEach(b=>b.classList.toggle('on',b.dataset.tab===t));
  render();
}

// ══ render ══════════════════════════════════════════════════════════
function render(){
  $('root').innerHTML='';
  if(screen==='dismiss'){$('root').append(buildDismiss());return;}
  if(curTab==='alarms')$('root').append(buildAlarmsTab());
  else if(curTab==='library')$('root').append(buildLibraryTab());
  else $('root').append(buildSettingsTab());
}

// ══ DISMISS ════════════════════════════════════════════════════════
function buildDismiss(){
  const wrap=div({style:{position:'fixed',inset:0,background:C.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',overflow:'hidden',direction:'rtl'}});
  wrap.append(div({style:{position:'absolute',inset:0,background:`radial-gradient(ellipse at 50% 30%,${C.amber} 0%,transparent 70%)`,animation:'pulse .8s ease-in-out infinite alternate',pointerEvents:'none'}}));
  const content=div({id:'dc',style:{position:'relative',display:'flex',flexDirection:'column',alignItems:'center',gap:'12px',padding:'0 24px',width:'100%',maxWidth:'380px'}});
  content.append(
    el('div',{cls:'ring',style:{fontSize:'64px'}},'⏰'),
    el('div',{style:{fontSize:'64px',fontWeight:200,color:C.text,letterSpacing:'-3px',fontVariantNumeric:'tabular-nums'}},activeAlarm.time),
    el('div',{style:{fontSize:'22px',fontWeight:600,textAlign:'center'}},activeAlarm.label),
    el('div',{style:{fontSize:'15px',color:C.muted,marginBottom:'8px'}},'כבה את השעון המעורר')
  );

  if(dismissMode===null){
    const btns=div({style:{display:'flex',gap:'10px',width:'100%',flexWrap:'wrap',justifyContent:'center'}});

    if(activeAlarm.barcode){
      btns.append(dBtn('📷','סרוק ברקוד',()=>{
        dismissMode='scan';render();
        openScanner(val=>{
          if(val===activeAlarm.barcode)dismissAlarm();
          else{dismissMode='scan-wrong';render();}
        });
      }));
    }
    if(activeAlarm.objId){
      const obj=objLib.find(o=>o.id===activeAlarm.objId);
      if(obj){
        btns.append(dBtn('📸','צלם חפץ',()=>{
          dismissMode='object';render();
          openObjectMatch(obj,()=>dismissAlarm());
        }));
      }
    }
    if(activeAlarm.password){
      btns.append(dBtn('🔑','הזן סיסמה',()=>{dismissMode='password';render();setTimeout(()=>$('pi')?.focus(),80);}));
    }

    // master password button always
    btns.append(dBtn('🔓','סיסמת מאסטר',()=>{dismissMode='master';render();setTimeout(()=>$('mi')?.focus(),80);}));

    content.append(btns);
  }

  if(dismissMode==='scan-wrong'){
    content.append(div({cls:'fadein',style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'14px',width:'100%'}},
      el('div',{style:{fontSize:'48px'}},'❌'),
      el('div',{style:{color:C.red,fontSize:'17px',fontWeight:700}},'ברקוד לא נכון!'),
      btn({style:{background:C.amber,color:'#000',border:'none',borderRadius:'14px',padding:'14px 32px',fontSize:'16px',fontWeight:700,cursor:'pointer'},
        onclick:()=>{dismissMode='scan';render();openScanner(val=>{if(val===activeAlarm.barcode)dismissAlarm();else{dismissMode='scan-wrong';render();doShake();}});}
      },'נסה שוב'),
      btn({style:{background:'none',border:'none',color:C.muted,fontSize:'14px',cursor:'pointer'},onclick:()=>{dismissMode=null;render();}},'← חזור')
    ));
  }

  if(dismissMode==='object'){
    content.append(div({cls:'fadein',style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'12px',width:'100%'}},
      el('div',{style:{fontSize:'36px'}},'📸'),
      el('div',{style:{color:C.text,fontSize:'16px',fontWeight:600,textAlign:'center'}},'המצלמה פועלת — צלם את החפץ'),
      btn({style:{background:'none',border:'none',color:C.muted,fontSize:'14px',cursor:'pointer',marginTop:'8px'},
        onclick:()=>{closeObjMatch();dismissMode=null;render();}},'← חזור')
    ));
  }

  // password
  function buildPwMode(id, checkFn, backFn){
    const pw=div({cls:'fadein',style:{width:'100%',display:'flex',flexDirection:'column',gap:'10px',alignItems:'center'}});
    const pinp=el('input',{id,type:'password',placeholder:'הזן סיסמה...',dir:'ltr',
      style:{width:'100%',background:C.card,border:`1.5px solid ${C.border}`,borderRadius:'14px',padding:'14px 16px',fontSize:'22px',textAlign:'center',letterSpacing:'6px',outline:'none',color:C.text}});
    const err=el('div',{id:'pe',style:{color:C.red,fontSize:'14px',fontWeight:600,display:'none'}},'סיסמה שגויה!');
    const tryIt=()=>{
      if(checkFn(pinp.value))dismissAlarm();
      else{err.style.display='block';pinp.value='';doShake();setTimeout(()=>err.style.display='none',1500);}
    };
    pinp.addEventListener('keydown',e=>e.key==='Enter'&&tryIt());
    pw.append(pinp,err,
      btn({style:{background:C.amber,color:'#000',border:'none',borderRadius:'14px',padding:'14px 40px',fontSize:'17px',fontWeight:700,cursor:'pointer'},onclick:tryIt},'אשר'),
      btn({style:{background:'none',border:'none',color:C.muted,fontSize:'14px',cursor:'pointer'},onclick:backFn},'← חזור')
    );
    return pw;
  }

  if(dismissMode==='password'){
    content.append(buildPwMode('pi',v=>v===activeAlarm.password,()=>{dismissMode=null;render();}));
  }
  if(dismissMode==='master'){
    content.append(buildPwMode('mi',v=>settings.masterPassword&&v===settings.masterPassword,()=>{dismissMode=null;render();}));
  }

  wrap.append(content);return wrap;
}

  alarms.forEach(a=>{

    const card=div({style:{background:C.card,borderRadius:'16px',padding:'16px 20px',marginBottom:'12px',display:'flex',justifyContent:'space-between',alignItems:'center',border:`1px solid ${C.border}`,opacity:a.enabled?1:.5}});

    if(a.barcode)bdg.append(chip('📷 ברקוד'));
    if(obj)bdg.append(chip('📸 '+obj.name));
    if(a.password)bdg.append(chip('🔑 סיסמה'));
    bdg.append(chip(rt.name));
    left.append(el('div',{style:{fontSize:'36px',fontWeight:300,letterSpacing:'-1px',fontVariantNumeric:'tabular-nums'}},a.time),
      el('div',{style:{fontSize:'13px',color:C.muted,marginTop:'3px'}},a.label),bdg);

// custom ringtones stored as { id, name, dataUrl (base64 audio) }
let customTones = [];
try { customTones = JSON.parse(localStorage.getItem('customTones')||'[]'); } catch{}
const saveCustomTones = () => { try{localStorage.setItem('customTones',JSON.stringify(customTones))}catch{} };

// audio element for custom tones
let customAudio = null;
function playCustomTone(dataUrl){
  if(customAudio){ customAudio.pause(); customAudio=null; }
  customAudio = new Audio(dataUrl);
  customAudio.volume = 0.8;
  customAudio.play().catch(()=>{});
}
function stopCustomAudio(){
  if(customAudio){ customAudio.pause(); customAudio.currentTime=0; customAudio=null; }
}

// Override startSound / stopSound to support custom tones
const _origStartSound = startSound;
const _origStopSound  = stopSound;
window._startAlarm = function(rid){
  if(rid && rid.startsWith('custom:')){
    const tid = rid.slice(7);
    const tone = customTones.find(t=>String(t.id)===tid);
    if(tone){
      stopCustomAudio();
      customAudio = new Audio(tone.dataUrl);
      customAudio.loop = true;
      customAudio.volume = 0.8;
      customAudio.play().catch(()=>{});
      return;
    }
  }
  _origStartSound(rid);
};
window._stopAlarm = function(){
  stopCustomAudio();
  _origStopSound();
};

  const rtCard=div({style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:'16px',padding:'20px',marginBottom:'16px'}});
  rtCard.append(
    el('div',{style:{fontSize:'16px',fontWeight:600,marginBottom:'4px'}},'🎵 רינגטונים מותאמים אישית'),
    el('div',{style:{fontSize:'13px',color:C.muted,marginBottom:'14px'}},'העלה קבצי MP3/WAV/OGG — הם יופיעו כאפשרות בבחירת רינגטון')
  );

  const toneList=div({});
  function renderToneList(){
    toneList.innerHTML='';
    if(!customTones.length){
      toneList.append(el('div',{style:{fontSize:'13px',color:C.muted,marginBottom:'12px'}},'אין רינגטונים מותאמים עדיין'));
    }
    customTones.forEach(t=>{
      const row=div({style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'8px',
        background:C.surface,borderRadius:'10px',padding:'10px 12px'}});
      const playBtn=btn({style:{background:C.amber,color:'#000',border:'none',borderRadius:'8px',
        padding:'6px 12px',fontSize:'13px',fontWeight:700,cursor:'pointer'},
        onclick:()=>playCustomTone(t.dataUrl)},'▶');
      const stopBtn=btn({style:{background:C.dimmer,color:C.text,border:'none',borderRadius:'8px',
        padding:'6px 12px',fontSize:'13px',cursor:'pointer'},
        onclick:stopCustomAudio},'■');
      const namEl=el('span',{style:{flex:1,fontSize:'14px',fontWeight:500,overflow:'hidden',
        textOverflow:'ellipsis',whiteSpace:'nowrap'}},t.name);
      const delBtn=btn({style:{background:'none',border:'none',fontSize:'16px',cursor:'pointer',opacity:.5},
        onclick:()=>{
          customTones=customTones.filter(x=>x.id!==t.id);saveCustomTones();
          // remove from alarms that used it
          alarms=alarms.map(a=>a.ringtone===`custom:${t.id}`?{...a,ringtone:'classic'}:a);saveAlarms();
          renderToneList();
        }},'🗑');
      row.append(playBtn,stopBtn,namEl,delBtn);
      toneList.append(row);
    });
  }
  renderToneList();
  rtCard.append(toneList);

  // upload button
  const fileInp=el('input',{type:'file',accept:'audio/*,audio/mp3,audio/wav,audio/ogg',style:{display:'none'}});
  fileInp.onchange=()=>{
    const file=fileInp.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      const dataUrl=e.target.result;
      const name=file.name.replace(/\.[^.]+$/,'');
      customTones.push({id:Date.now(),name,dataUrl});
      saveCustomTones();
      renderToneList();
    };
    reader.readAsDataURL(file);
    fileInp.value='';
  };
  const uploadBtn=btn({style:{width:'100%',background:C.surface,border:`1.5px dashed ${C.amberDim}`,
    borderRadius:'12px',padding:'13px',color:C.amber,fontSize:'15px',fontWeight:600,cursor:'pointer',
    textAlign:'center',marginTop:'4px'},
    onclick:()=>fileInp.click()},'+ העלה קובץ אודיו');
  rtCard.append(fileInp,uploadBtn);
  wrap.append(rtCard);

  // ── info ─────────────────────────────────────────────────────────
  wrap.append(div({style:{background:C.card,border:`1px solid ${C.border}`,borderRadius:'16px',padding:'20px'}},
    el('div',{style:{fontSize:'16px',fontWeight:600,marginBottom:'8px'}},'ℹ️ אודות'),
    el('div',{style:{fontSize:'13px',color:C.muted,lineHeight:1.8}},
      '• שעוני מעורר ותמונות נשמרים בדפדפן',el('br',{}),'• ספריית חפצים — מצלם חפץ, בזמן כיבוי צולם שוב ומשווה',el('br',{}),'• סיסמת מאסטר מכבה כל שעון בחירום'
    )
  ));

  return wrap;
}

// ══ clock tick ══════════════════════════════════════════════════════
let lastSec=-1;
setInterval(()=>{
  const now=new Date();const s=now.getSeconds();
  checkAlarms();
  if(s!==lastSec&&screen==='home'&&curTab==='alarms'){
    lastSec=s;
    const ct=$('ct'),cs=$('cs');
    if(!ct){render();return;}
    ct.childNodes[0].textContent=pad(now.getHours())+':'+pad(now.getMinutes());
    cs.textContent=pad(s);
  }
},500);

render();
</script>
</body>
